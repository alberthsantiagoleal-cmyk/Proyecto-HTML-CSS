<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberX - Confirmación Luna</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/app.css">
</head>
<body>
  <section id="receipt" style="display:flex;">
    <div class="screen receipt-screen">
      <div class="receipt-check">&#10003;</div>
      <h2 class="receipt-title">¡Reserva<br>confirmada!</h2>
      <p class="receipt-sub">Tu viaje fue reservado exitosamente. Recibirás los detalles en tu correo electrónico.</p>
      <div class="ticket">
        <div class="ticket-top">
          <div class="ticket-city">
            <span class="city-code">BOG</span>
            <span class="city-name">Bogotá</span>
          </div>
          <div class="ticket-mid">
            <span class="plane-icon">&#9992;</span>
            <div class="flight-line"></div>
          </div>
          <div class="ticket-city align-right">
            <span class="city-code">LUN</span>
            <span class="city-name">Luna</span>
          </div>
        </div>
        <div class="ticket-divider">
          <div class="t-circle left"></div>
          <div class="t-dashes"></div>
          <div class="t-circle right"></div>
        </div>
        <div class="ticket-bottom">
          <div class="tf"><span class="tf-label">Código</span><span class="tf-val">UBX-LUN</span></div>
          <div class="tf"><span class="tf-label">Fecha</span><span class="tf-val">Mar 08, 2053</span></div>
          <div class="tf"><span class="tf-label">Duración</span><span class="tf-val">3d 4h</span></div>
          <div class="tf"><span class="tf-label">Total</span><span class="tf-val accent">22.0 ◎</span></div>
        </div>
      </div>
      <a href="02-home.html" class="btn btn-primary">Volver al inicio</a>
      <a href="03-travel-luna.html" class="btn btn-ghost">Ver más destinos</a>
    </div>
  </section>
</body>
</html>
