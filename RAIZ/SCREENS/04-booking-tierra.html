<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberX - Reserva Tierra</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/app.css">
</head>
<body>
  <section id="booking">
    <div class="space-map">
      <div class="space-map-bg"></div>
      <div class="stars"></div>
      <a href="03-travel-tierra.html" class="map-back">&#8592;</a>
      <div class="planet-mars">
        <img src="../ASSETS/img/luna.jpg" alt="Tierra" class="planet-img">
        <div class="planet-label">Tierra &rsaquo;</div>
      </div>
      <div class="orbit-path"></div>
      <div class="planet-earth">
        <span style="font-size:3rem;">🌍</span>
        <div class="planet-label">Origen &rsaquo;</div>
      </div>
    </div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-notice">Las tarifas son más altas por escombros espaciales</p>
      <div class="ship-detail">
        <div class="ship-detail-img">🚀</div>
        <div class="ship-detail-name">Crew Dragon <span class="passengers">👤7</span></div>
        <div class="ship-detail-price">32.0 <div class="coin">◎</div></div>
        <p class="ship-detail-sub">Próximo lanzamiento: 15/03/53, 08:00<br>Duración del viaje: 3 días, 6 horas</p>
      </div>
      <div class="bottom-actions">
        <div class="btn-wallet">
          <div class="btn-wallet-left"><span class="wallet-icon">❖</span><span>Conectar billetera</span></div>
          <span>›</span>
        </div>
        <input type="checkbox" id="swipe-check" class="swipe-check">
        <label for="swipe-check" class="swipe-btn">
          <span class="swipe-thumb">›</span>
          <span class="swipe-label">Desliza para confirmar</span>
          <span class="swipe-done">✓ Confirmado</span>
        </label>
        <a href="05-payment-tierra.html" class="swipe-link">Continuar al pago →</a>
      </div>
    </div>
  </section>
</body>
</html>
