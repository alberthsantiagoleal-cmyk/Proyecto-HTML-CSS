<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberX - Confirmación Marte</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> <!-- Carga dos fuentes: Syne para el título y DM Sans para el resto -->
  <link rel="stylesheet" href="../CSS/app.css">
</head>
<body>

  <section id="receipt" style="display:flex;"> <!-- Pantalla de confirmación, display:flex inline activa el centrado vertical del contenido -->
    <div class="screen receipt-screen"> <!-- Contenedor interno que centra todo el contenido -->

      <div class="receipt-check">&#10003;</div> <!-- Símbolo ✓ grande, &#10003; es el código HTML del checkmark, animado con fadeUp -->
      <h2 class="receipt-title">¡Reserva<br>confirmada!</h2> <!-- Título principal, <br> fuerza el salto de línea, animado con fadeUp con delay -->
      <p class="receipt-sub">Tu viaje fue reservado exitosamente. Recibirás los detalles en tu correo electrónico.</p> <!-- Subtítulo informativo, animado con fadeUp -->

      <div class="ticket"> <!-- Tarjeta visual que simula un tiquete de avión/nave, animada con fadeUp -->

        <div class="ticket-top"> <!-- Sección superior del tiquete con origen y destino -->
          <div class="ticket-city"> <!-- Columna del origen -->
            <span class="city-code">BOG</span> <!-- Código de 3 letras del origen (Bogotá) -->
            <span class="city-name">Bogotá</span> <!-- Nombre completo del origen -->
          </div>
          <div class="ticket-mid"> <!-- Columna central con el ícono de nave y la línea de vuelo -->
            <span class="plane-icon">&#9992;</span> <!-- Símbolo ✈ de avión/nave, &#9992; es su código HTML -->
            <div class="flight-line"></div> <!-- Línea horizontal decorativa que conecta origen y destino -->
          </div>
          <div class="ticket-city align-right"> <!-- Columna del destino, align-right lo alinea a la derecha -->
            <span class="city-code">MRS</span> <!-- Código del destino (Marte) -->
            <span class="city-name">Marte</span>
          </div>
        </div>

        <div class="ticket-divider"> <!-- Separador decorativo entre la parte superior e inferior del tiquete -->
          <div class="t-circle left"></div> <!-- Semicírculo izquierdo que simula el corte del tiquete -->
          <div class="t-dashes"></div> <!-- Línea punteada central del separador -->
          <div class="t-circle right"></div> <!-- Semicírculo derecho -->
        </div>

        <div class="ticket-bottom"> <!-- Sección inferior del tiquete con los detalles del viaje -->
          <div class="tf"><span class="tf-label">Código</span><span class="tf-val">UBX-MRS</span></div> <!-- Fila: etiqueta gris + valor blanco -->
          <div class="tf"><span class="tf-label">Fecha</span><span class="tf-val">Mar 12, 2053</span></div>
          <div class="tf"><span class="tf-label">Duración</span><span class="tf-val">18d 13h</span></div>
          <div class="tf"><span class="tf-label">Total</span><span class="tf-val accent">48.5 ◎</span></div> <!-- accent aplica el color dorado al precio -->
        </div>

      </div>

      <a href="02-home.html" class="btn btn-primary">Volver al inicio</a> <!-- Botón principal dorado, animado con fadeUp -->
      <a href="03-travel-marte.html" class="btn btn-ghost">Ver más destinos</a> <!-- Botón secundario transparente con borde, animado con fadeUp con más delay -->

    </div>
  </section>

</body>
</html>
