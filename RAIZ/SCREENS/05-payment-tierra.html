<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberX - Métodos de Pago</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/app.css">
</head>
<body>
  <section id="payment">
    <div class="pay-header">
      <a href="04-booking-tierra.html" class="pay-back">&#8592;</a>
      <h2>Métodos de Pago</h2>
    </div>
    <div class="pay-search"><span>🔍</span><span>Buscar métodos de pago</span></div>
    <div class="pay-list">
      <input type="radio" name="pay" id="pay-1" class="pay-radio" checked>
      <label for="pay-1" class="pay-card-item">
        <div class="pay-card-logo" style="background:#fff;"><span style="font-size:1.2rem;">🔴</span></div>
        <div class="pay-card-info"><h4>**** **** **** 1234</h4><p>Vence 12/25</p></div>
        <span class="badge-default">Predeterminada</span>
        <span class="pay-selected-mark">✓</span>
      </label>
      <input type="radio" name="pay" id="pay-2" class="pay-radio">
      <label for="pay-2" class="pay-card-item">
        <div class="pay-card-logo" style="background:#3a4a5a;"><span style="font-size:0.7rem;color:#aaa;">TM</span></div>
        <div class="pay-card-info"><h4>**** **** **** 5678</h4><p>Vence 01/26</p></div>
        <span class="pay-selected-mark">✓</span>
      </label>
      <input type="radio" name="pay" id="pay-3" class="pay-radio">
      <label for="pay-3" class="pay-card-item">
        <div class="pay-card-logo" style="background:#003087;"><span style="font-size:1rem;color:#fff;">P</span></div>
        <div class="pay-card-info"><h4>PayPal</h4></div>
        <span class="pay-selected-mark">✓</span>
      </label>
    </div>
    <a href="#modal-add" class="btn-add">Agregar nuevo método</a>
    <a href="06-receipt-tierra.html" class="btn-confirm">Confirmar pago</a>
    <div id="modal-add" class="modal-overlay">
      <div class="modal-box">
        <a href="#" class="modal-close">✕</a>
        <h3>Nuevo método de pago</h3>
        <input type="text" class="modal-input" placeholder="Número de tarjeta">
        <div class="modal-row">
          <input type="text" class="modal-input" placeholder="MM/AA">
          <input type="text" class="modal-input" placeholder="CVV">
        </div>
        <input type="text" class="modal-input" placeholder="Nombre en la tarjeta">
        <a href="#" class="btn-confirm" style="margin:0;">Agregar tarjeta</a>
      </div>
    </div>
  </section>
</body>
</html>
