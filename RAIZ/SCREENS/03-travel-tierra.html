<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberX - Explorar Tierra</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/app.css">
</head>
<body>
  <section id="travel">
    <div class="space-map">
      <div class="space-map-bg"></div>
      <div class="stars"></div>
      <a href="02-home.html" class="map-back">&#8592;</a>
      <div class="planet-mars">
        <img src="../ASSETS/img/luna.jpg" alt="Tierra" class="planet-img">
        <div class="planet-label">Tierra &rsaquo;</div>
      </div>
      <div class="orbit-path"></div>
      <div class="planet-earth">
        <span style="font-size:3rem;">🌍</span>
        <div class="planet-label">Origen &rsaquo;</div>
      </div>
    </div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-notice">Destino: <strong>Tierra</strong> — Las tarifas son más altas por escombros espaciales</p>
      <div class="ship-list">
        <input type="radio" name="ship" id="ship-1" class="ship-radio" checked>
        <label for="ship-1" class="ship-item">
          <div class="ship-icon">🚀</div>
          <div class="ship-info"><h4>Crew Dragon</h4><p>Próximo lanzamiento: 15/03/53, 08:00</p></div>
          <div class="ship-price">32.0 <div class="coin">◎</div></div>
          <span class="ship-check">✓</span>
        </label>
        <input type="radio" name="ship" id="ship-2" class="ship-radio">
        <label for="ship-2" class="ship-item">
          <div class="ship-icon">🛸</div>
          <div class="ship-info"><h4>Starliner</h4><p>Próximo lanzamiento: 20/03/53, 14:00</p></div>
          <div class="ship-price">35.5 <div class="coin">◎</div></div>
          <span class="ship-check">✓</span>
        </label>
        <input type="radio" name="ship" id="ship-3" class="ship-radio">
        <label for="ship-3" class="ship-item">
          <div class="ship-icon">✈️</div>
          <div class="ship-info"><h4>Dream Chaser</h4><p>Próximo lanzamiento: 22/03/53, 10:00</p></div>
          <div class="ship-price">78.0 <div class="coin">◎</div></div>
          <span class="ship-check">✓</span>
        </label>
      </div>
      <div class="bottom-actions">
        <div class="btn-wallet">
          <div class="btn-wallet-left"><span class="wallet-icon">❖</span><span>Conectar billetera</span></div>
          <span>›</span>
        </div>
        <a href="04-booking-tierra.html" class="btn-swipe">
          <div class="swipe-arrow">›</div>
          <span>Desliza para confirmar tu reserva</span>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
