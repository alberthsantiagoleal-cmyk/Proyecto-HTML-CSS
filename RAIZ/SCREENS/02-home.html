<!DOCTYPE html> <!-- Declara que el documento es HTML5 -->
<html lang="es"> <!-- Idioma español para accesibilidad y SEO -->
<head>
  <meta charset="UTF-8"> <!-- Soporte de caracteres especiales como tildes -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Adaptación a pantallas móviles -->
  <title>UberX - Inicio</title> <!-- Título en la pestaña del navegador -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"> <!-- Fuente DM Sans desde Google Fonts -->
  <link rel="stylesheet" href="../CSS/app.css"> <!-- Hoja de estilos del proyecto -->
</head>
<body>

  <section id="home"> <!-- Pantalla principal, el id "home" activa los estilos de #home en CSS -->

    <div class="home-header"> <!-- Barra superior con avatar y nombre de usuario -->
      <div class="avatar">👨🚀</div> <!-- Ícono de perfil del usuario -->
      <span>William Teig</span> <!-- Nombre del usuario -->
    </div>

    <div class="banner"> <!-- Tarjeta informativa destacada -->
      <div class="banner-text"> <!-- Columna izquierda del banner con texto -->
        <h3>Siempre usa tu casco cuando viajes al espacio</h3> <!-- Título del banner -->
        <a href="#">Sobre vuelos espaciales seguros &rsaquo;</a> <!-- Enlace secundario, &rsaquo; es el símbolo › -->
      </div>
      <div class="banner-img">🧑🚀</div> <!-- Imagen decorativa del banner (emoji) -->
    </div>

    <div class="categories"> <!-- Fila de 3 categorías de acción rápida -->
      <div class="cat-item pressable"> <!-- Categoría "Viajar", pressable activa el efecto de escala al presionar -->
        <span class="cat-icon">🚀</span> <!-- Ícono grande de la categoría -->
        <span>Viajar</span> <!-- Etiqueta de texto -->
      </div>
      <a href="03-travel.html" class="cat-item pressable"> <!-- Categoría "Explorar", es un enlace que navega a la pantalla de viajes -->
        <span class="cat-icon">🪐</span>
        <span>Explorar</span>
      </a>
      <div class="cat-item pressable"> <!-- Categoría "Reservar" -->
        <span class="cat-icon">📋</span>
        <span>Reservar</span>
      </div>
    </div>

    <label class="search-bar" for="search-input"> <!-- label envuelve la barra para que :focus-within funcione al hacer clic en cualquier parte -->
      <div class="search-left"> <!-- Lado izquierdo: ícono + input de texto -->
        <span>🔍</span> <!-- Ícono de búsqueda decorativo -->
        <input id="search-input" class="search-input" type="text" placeholder="¿A dónde vas?"> <!-- Campo de texto real, su id coincide con el for del label -->
      </div>
      <div class="search-right"> <!-- Lado derecho: selector de hora -->
        <span>🕐</span>
        <span>Ahora</span>
        <span>▾</span> <!-- Flecha hacia abajo indicando que es un menú desplegable -->
      </div>
    </label>

    <div class="dest-list"> <!-- Lista de destinos disponibles -->

      <a href="03-travel-tierra.html" class="dest-item"> <!-- Destino Tierra, enlaza a su propia pantalla de exploración -->
        <div class="dest-icon">🌍</div> <!-- Ícono circular del destino -->
        <div class="dest-info"> <!-- Columna de texto del destino -->
          <h4>Tierra</h4>
          <p>Sistema Solar, Planeta 4</p> <!-- Descripción secundaria en color gris -->
        </div>
      </a>

      <a href="03-travel-marte.html" class="dest-item"> <!-- Destino Marte -->
        <div class="dest-icon"><img src="../ASSETS/img/Marte.webp" alt="Marte"></div> <!-- Imagen real de Marte en lugar de emoji -->
        <div class="dest-info">
          <h4>Marte</h4>
          <p>Sistema Solar, Planeta 5</p>
        </div>
      </a>

      <a href="03-travel-eei.html" class="dest-item"> <!-- Destino Estación Espacial Internacional -->
        <div class="dest-icon">🛸</div>
        <div class="dest-info">
          <h4>Estación Espacial Internacional</h4>
          <p>Órbita Baja Terrestre</p>
        </div>
      </a>

      <a href="03-travel-luna.html" class="dest-item"> <!-- Destino Luna -->
        <div class="dest-icon"><img src="../ASSETS/img/luna.jpg" alt="Luna"></div> <!-- Imagen real de la Luna -->
        <div class="dest-info">
          <h4>Luna</h4>
          <p>Órbita Alta Terrestre</p>
        </div>
      </a>

    </div>

    <nav class="bottom-nav"> <!-- Barra de navegación fija en la parte inferior -->

      <!-- Los dos radio están ocultos con CSS, pero guardan el estado del tab activo -->
      <input type="radio" name="nav" id="nav-home" class="nav-radio" checked> <!-- Radio del tab Inicio, checked = activo por defecto -->
      <input type="radio" name="nav" id="nav-viajes" class="nav-radio"> <!-- Radio del tab Viajes -->

      <label for="nav-home" class="nav-item"> <!-- Al hacer clic aquí se marca el radio nav-home, CSS lo pone blanco -->
        <span class="nav-icon">🏠</span>
        <span>Inicio</span>
      </label>

      <div class="nav-divider"></div> <!-- Línea vertical separadora entre tabs -->

      <a href="../test/07-missions.html" class="nav-item">
        <span class="nav-icon">🌐</span>
        <span>Viajes</span>
      </a>

    </nav>

  </section>

</body>
</html>
