<!DOCTYPE html> <!-- Le dice al navegador que este archivo usa HTML5 -->
<html lang="es"> <!-- Raíz del documento, lang="es" indica que el idioma es español -->
<head> <!-- Sección de configuración, no se muestra en pantalla -->
  <meta charset="UTF-8"> <!-- Permite usar tildes, ñ y caracteres especiales -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que la página se vea bien en móviles -->
  <title>UberX</title> <!-- Texto que aparece en la pestaña del navegador -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"> <!-- Carga la fuente DM Sans desde internet en 4 grosores -->
  <link rel="stylesheet" href="../CSS/app.css"> <!-- Conecta este HTML con el archivo de estilos -->
</head>
<body> <!-- Todo lo que se ve en pantalla va aquí -->

  <section id="splash"> <!-- Contenedor principal de la pantalla de carga, el id lo usa CSS para darle estilos -->
    <a href="02-home.html" class="splash-link"> <!-- Enlace que lleva a Home al hacer clic en cualquier parte del logo -->
      <span class="splash-wordmark">UBERX</span> <!-- Texto del logo, CSS le aplica la animación de caída -->
      <span class="splash-sub">Viajes interplanetarios</span> <!-- Subtítulo, aparece con un pequeño retraso después del logo -->
    </a>
  </section>

</body>
</html>
