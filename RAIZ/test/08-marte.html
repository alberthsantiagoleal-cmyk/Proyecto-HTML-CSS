<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UberX - Confirmación Marte</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="../CSS/app.css">
</head>
<body>

  <section id="receipt" style="display:flex;"> 
    <div class="screen receipt-screen"> 

      <div class="receipt-check">&#10003;</div> 
      <h2 class="receipt-title">¡Viaje<br>Completado!</h2> 
      <p class="receipt-sub">Tu viaje se completo exitosamente.</p> 

      <div class="ticket"> 

        <div class="ticket-top"> 
          <div class="ticket-city">
            <h2 class="city-code"></h2class>Mision</span><br></h2> 
            <span class="city-code">BOG</span> 
            <span class="city-name">Bogotá</span>
          </div>
          <div class="ticket-mid">
            <span class="plane-icon">&#9992;</span> 
            <div class="flight-line"></div>
          </div>
          <div class="ticket-city align-right"> 
            <span class="city-code">MRS</span> 
            <span class="city-name">Marte</span>
          </div>
        </div>

        <div class="ticket-divider"> 
          <div class="t-circle left"></div> 
          <div class="t-dashes"></div>
          <div class="t-circle right"></div>
        </div>

        <div class="ticket-bottom"> 
          <div class="tf"><span class="tf-label">Código</span><span class="tf-val">UBX-MRS</span></div> 
          <div class="tf"><span class="tf-label">Fecha</span><span class="tf-val">Mar 12, 2053</span></div>
          <div class="tf"><span class="tf-label">Duración</span><span class="tf-val">18d 13h</span></div>
          <div class="tf"><span class="tf-label">Total</span><span class="tf-val accent">48.5 ◎</span></div> 
        </div>

      </div>

      <a href="../SCREENS/02-home.html" class="btn btn-primary">Volver al inicio</a>

       <br>
      <a href="07-missions.html" class="btn btn-ghost">Ir atras 

    </div>
  </section>

</body>
</html>
